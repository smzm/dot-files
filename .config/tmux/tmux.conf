
#   >>>>>>  To install plugins open tmux and press prefix + I <<<<<<<

# ==============================================================================
# ========================= TMUX CONFIGURATION FILE ============================
# ==============================================================================

# Load keybindings conf file
source-file ~/.config/tmux/tmux.keybindings.conf

# ==============================================================================
# ======================= CORE SETTINGS & BEHAVIOR ============================
# ==============================================================================

set -g mouse on
set -g prefix `
set -g base-index 1
set -g detach-on-destroy off
set -g escape-time 0
set -g history-limit 1000000
set -g renumber-windows on
set -g set-clipboard on
setw -g mode-keys vi
set -g status-position top

# ==============================================================================
# ======================== TERMINAL & COLOR SETTINGS ==========================
# ==============================================================================

# Proper truecolor + transparency support
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:RGB"

# NEVER paint backgrounds (required for transparency)
set -g window-style bg=default
set -g window-active-style bg=default
set -g status-style bg=default
set -g message-style bg=default
set -g message-command-style bg=default

# Pane borders
set -g pane-border-style "fg=brightblack,bg=default"
set -g pane-active-border-style "fg=white,bg=default"

# ==============================================================================
# ============================= THEME SETTINGS ================================
# ==============================================================================

# Foreground palette only (no bg colors)

set -g @brightGray "#606060"
set -g @lightGray "#505050"
set -g @darkGray "#303030"
set -g @dimGray "#222222"
set -g @white "#A2A2A2"

# Powerline separators
set -g @separator_right ""
set -g @separator_left ""

# ---------------- STATUS BAR ----------------

set -g status-left-length 100
set -g status-right-length 100

set -g status-left "#[fg=#{@dimGray},bg=default]#{@separator_right}#[fg=#{@lightGray},bg=#{@dimGray}] #S #[fg=#{@dimGray},bg=default]#{@separator_left}"

set -g status-right "#[fg=#{@darkGray},bg=default]#{@separator_right}#[fg=#{@lightGray}, bg=#{@darkGray}] %H:%M #[fg=#{@darkGray}, bg=default]#{@separator_left}"

# ---------------- WINDOWS ----------------

# Inactive tabs
setw -g window-status-format " #[fg=#{@dimGray},bg=default]#{@separator_right}#[bg=#{@dimGray}, fg=#{@lightGray}]#I #[bg=#{@darkGray}] #W #[bg=default,fg=#{@darkGray}]#{@separator_left}"

# Active tab
setw -g window-status-current-format " #[fg=#{@brightGray},bg=default]#{@separator_right}#[bg=#{@brightGray}, fg=#{@white}]#I #[bg=#{@lightGray}] #W #[bg=default,fg=#{@lightGray}]#{@separator_left}"

# ==============================================================================
# ============================= PLUGIN SETTINGS ===============================
# ==============================================================================

# FZF URL
set -g @fzf-url-fzf-options '-p 60%,30% --prompt="   " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'

# Floax
set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color 'white'
set -g @floax-text-color 'blue'
set -g @floax-bind 'p'
set -g @floax-change-path 'false'

# Sessionx
set -g @sessionx-auto-accept 'off'
set -g @sessionx-bind 'o'
set -g @sessionx-window-height '85%'
set -g @sessionx-window-width '75%'
set -g @sessionx-zoxide-mode 'on'
set -g @sessionx-custom-paths-subdirectories 'false'
set -g @sessionx-filter-current 'false'

# Resurrect
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'off'

# Continuum
set -g @continuum-restore 'on'

# ==============================================================================
# =============================== IMAGE PREVIEW ===============================
# ==============================================================================

set -gq allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM
set -g visual-activity off

# ==============================================================================
# ================================= PLUGINS ===================================
# ==============================================================================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'omerxx/tmux-floax'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'Brutuski/tmux-ticker'

# ==============================================================================
# ============================= PLUGIN MANAGER ================================
# ==============================================================================

run '~/.config/tmux/plugins/tpm/tpm'
