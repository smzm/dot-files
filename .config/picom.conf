
#################################
# Backend
#################################

backend = "glx";
vsync = true;

#################################
# General
#################################

detect-rounded-corners = true;
detect-client-opacity = true;
use-damage = true;
log-level = "warn";

#################################
# Shadows
#################################

shadow = true;
shadow-radius = 18;
shadow-opacity = 0.45;
shadow-offset-x = -15;
shadow-offset-y = -15;

shadow-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'dunst'",
  "class_g = 'rofi'"
];

#################################
# Fading / Animations
#################################

fading = true;
fade-delta = 8;
fade-in-step = 0.04;
fade-out-step = 0.04;

#################################
# Transparency
#################################

inactive-opacity = 0.95;
active-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;

focus-exclude = [
  "class_g = 'Cairo-clock'",
  "class_g = 'Bar'",
  "class_g = 'slop'"
];

#################################
# Blur (modern & performant)
#################################

blur-method = "dual_kawase";
blur-strength = 7;

blur-background = true;
blur-background-frame = false;
blur-background-fixed = false;

blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'firefox'"
];

#################################
# Rounded Corners
#################################

corner-radius = 10;

rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

#################################
# Fullscreen Optimization
#################################

unredir-if-possible = true;
